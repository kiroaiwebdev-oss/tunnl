name: tunnl
description: Tunnl - New Way to Math
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  url_launcher: ^6.2.5
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  razorpay_flutter: ^1.3.7
  # In-app video playback (run `flutter pub get` after pulling):
  #  - video_player: local / direct .mp4 uploads
  #  - youtube_player_flutter: plays YouTube links INSIDE the app
  video_player: ^2.8.1
  youtube_player_flutter: ^9.0.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/image.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D2233"
  adaptive_icon_foreground: "assets/images/image.png"
  # Generates square, round AND adaptive icons (run:
  #   dart run flutter_launcher_icons
  # after pulling, if you want to regenerate from image.png).
  android_format: adaptiveAndRound
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # Note: Orbitron + Poppins fonts are loaded at runtime by the
  # `google_fonts` package, so no local font asset declarations are needed.